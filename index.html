<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eldorado</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #f4f6fb;
    --white: #ffffff;
    --border: #e3e6f0;
    --text: #181c2e;
    --muted: #7b82a0;
    --c1: #3b7eff;
    --c2: #00b87a;
    --c3: #f05a5a;
  }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    height: 60px;
    display: flex;
    align-items: center;
    padding: 0 36px;
    gap: 12px;
    box-shadow: 0 1px 12px rgba(30,40,100,.06);
    flex-shrink: 0;
  }
  .logo-box {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: linear-gradient(135deg, #3b7eff, #a259ff);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .logo-name { font-size: 17px; font-weight: 800; color: var(--text); letter-spacing: -.02em; }
  .logo-name span { color: var(--c1); }
  .topbar-sub { margin-left: auto; font-size: 12px; color: var(--muted); font-weight: 500; }

  /* ── HERO ── */
  .hero {
    padding: 48px 36px 16px;
    text-align: center;
  }
  .hero h1 { font-size: 28px; font-weight: 800; color: var(--text); letter-spacing: -.03em; }
  .hero p  { margin-top: 8px; font-size: 14px; color: var(--muted); font-weight: 500; }

  /* ── CARDS GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    padding: 24px 36px 40px;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
  }

  @media (max-width: 900px) {
    .grid { grid-template-columns: repeat(2, 1fr); padding: 16px 20px 32px; gap: 16px; }
    .hero { padding: 32px 20px 12px; }
    .hero h1 { font-size: 22px; }
    .topbar { padding: 0 20px; }
  }

  @media (max-width: 560px) {
    .grid { grid-template-columns: 1fr; padding: 12px 14px 28px; gap: 14px; }
    .hero { padding: 24px 14px 10px; }
    .hero h1 { font-size: 20px; }
    .hero p { font-size: 13px; }
    .topbar { padding: 0 14px; height: 54px; }
    .logo-name { font-size: 15px; }
    .topbar-sub { font-size: 11px; }
    .card-header { padding: 14px 14px 12px; gap: 10px; }
    .app-icon { width: 36px; height: 36px; font-size: 18px; }
    .card-title { font-size: 13px; }
    .overlay-bar { padding: 0 14px; gap: 10px; }
    .back-btn { padding: 5px 12px; font-size: 11px; }
    .overlay-title { font-size: 13px; }
    .overlay-url { display: none; }
  }

  .card {
    background: var(--white);
    border-radius: 20px;
    border: 1.5px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: transform .22s cubic-bezier(.4,0,.2,1), box-shadow .22s;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 16px 48px rgba(30,40,100,.13);
    border-color: transparent;
  }
  .card:nth-child(1):hover { box-shadow: 0 16px 48px rgba(59,126,255,.18); }
  .card:nth-child(2):hover { box-shadow: 0 16px 48px rgba(0,184,122,.18); }
  .card:nth-child(3):hover { box-shadow: 0 16px 48px rgba(240,90,90,.18); }

  /* Card header strip */
  .card-header {
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .app-icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .card:nth-child(1) .app-icon { background: #eef3ff; }
  .card:nth-child(2) .app-icon { background: #e6faf4; }
  .card:nth-child(3) .app-icon { background: #fef0f0; }

  .card-meta { flex: 1; min-width: 0; }
  .card-title { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-desc  { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 500; }

  .open-btn {
    font-size: 11px; font-weight: 700;
    padding: 6px 14px;
    border-radius: 50px;
    border: none; cursor: pointer;
    letter-spacing: .03em;
    text-transform: uppercase;
    transition: opacity .18s, transform .18s;
    flex-shrink: 0;
  }
  .open-btn:hover { opacity: .85; transform: scale(.97); }
  .card:nth-child(1) .open-btn { background: var(--c1); color: #fff; }
  .card:nth-child(2) .open-btn { background: var(--c2); color: #fff; }
  .card:nth-child(3) .open-btn { background: var(--c3); color: #fff; }



  /* ── FULLSCREEN OVERLAY ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    flex-direction: column;
    background: var(--bg);
    animation: fadeIn .25s ease;
  }
  .overlay.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: scale(.98); } to { opacity: 1; transform: scale(1); } }

  .overlay-bar {
    height: 54px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 14px;
    flex-shrink: 0;
    box-shadow: 0 1px 8px rgba(30,40,100,.06);
  }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 50px; padding: 6px 16px;
    font-size: 12px; font-weight: 700; color: var(--text);
    cursor: pointer; transition: background .15s;
    letter-spacing: .02em;
  }
  .back-btn:hover { background: var(--border); }
  .overlay-title { font-size: 14px; font-weight: 700; color: var(--text); }
  .overlay-url   { font-size: 11px; color: var(--muted); margin-left: auto; font-weight: 500; }

  .overlay iframe {
    flex: 1;
    width: 100%;
    border: none;
    display: block;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo-box">⚡</div>
  <div class="logo-name">El<span>dorado</span></div>
  <div class="topbar-sub">3 apps · click any card to open</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Your App Dashboard</h1>
  <p>All three tools, one place. Click a card to open any app full screen.</p>
</div>

<!-- CARDS -->
<div class="grid">

  <div class="card" onclick="openApp(0)">
    <div class="card-header">
      <div class="app-icon">🛒</div>
      <div class="card-meta">
        <div class="card-title">Purchase Tracker</div>
        <div class="card-desc">Track & manage purchases</div>
      </div>
      <button class="open-btn" onclick="event.stopPropagation(); openApp(0)">Open</button>
    </div>
  </div>

  <div class="card" onclick="openApp(1)">
    <div class="card-header">
      <div class="app-icon">🏆</div>
      <div class="card-meta">
        <div class="card-title">El Dorado Due</div>
        <div class="card-desc">Manage dues &amp; records</div>
      </div>
      <button class="open-btn" onclick="event.stopPropagation(); openApp(1)">Open</button>
    </div>
  </div>

  <div class="card" onclick="openApp(2)">
    <div class="card-header">
      <div class="app-icon">🍎</div>
      <div class="card-meta">
        <div class="card-title">Apple Price List</div>
        <div class="card-desc">Browse Apple product prices</div>
      </div>
      <button class="open-btn" onclick="event.stopPropagation(); openApp(2)">Open</button>
    </div>
  </div>

</div>

<!-- FULLSCREEN OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-bar">
    <button class="back-btn" onclick="closeApp()">← Back</button>
    <div class="overlay-title" id="overlay-title">App</div>
    <div class="overlay-url" id="overlay-url"></div>
  </div>
  <iframe id="overlay-frame" src="" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>

<script>
  const apps = [
    { name: 'Purchase Tracker',  url: 'https://mandalkuntal86-hash.github.io/purchase-tracker/' },
    { name: 'El Dorado Due',     url: 'https://mandalkuntal86-hash.github.io/eldoradodue/' },
    { name: 'Apple Price List',  url: 'https://mandalkuntal86-hash.github.io/apple-price-list/apple_price_list.html' }
  ];

  function openApp(i) {
    const overlay = document.getElementById('overlay');
    document.getElementById('overlay-title').textContent = apps[i].name;
    document.getElementById('overlay-url').textContent   = apps[i].url;
    document.getElementById('overlay-frame').src         = apps[i].url;
    overlay.classList.add('open');
  }

  function closeApp() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('overlay-frame').src = '';
  }
</script>
</body>
</html>
